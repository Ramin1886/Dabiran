name: Deployment Pipeline

# Continuous deployment: build + publish container images to GHCR, then
# (optionally) roll them out to Kubernetes via the production Kustomize overlay.
#
# Triggers:
#   * release: [published]  -> images tagged with the release tag + latest
#   * workflow_dispatch      -> manual run; images tagged with the short SHA + latest
#
# The "deploy" job only runs when a repository secret named KUBE_CONFIG is set
# (a raw, non-base64 kubeconfig). When it is absent the job logs a skip and
# exits cleanly, so the image build/publish still succeeds on a fresh repo.

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image base names. Owner is lowercased at runtime (GHCR requires lowercase).
  BACKEND_IMAGE_SUFFIX: git-interactive-backend
  FRONTEND_IMAGE_SUFFIX: git-interactive-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image names and tag
        id: meta
        run: |
          owner_lc="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          backend_image="${REGISTRY}/${owner_lc}/${BACKEND_IMAGE_SUFFIX}"
          frontend_image="${REGISTRY}/${owner_lc}/${FRONTEND_IMAGE_SUFFIX}"
          # Prefer the release tag; fall back to the short SHA for manual runs.
          tag="${{ github.event.release.tag_name }}"
          if [ -z "$tag" ]; then
            tag="$(echo "${{ github.sha }}" | cut -c1-7)"
          fi
          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${frontend_image}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Backend:  ${backend_image}:${tag}"
          echo "Frontend: ${frontend_image}:${tag}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.backend_image }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          # Frontend build context is the repository ROOT so the npm workspace
          # packages (@git-viz/*) resolve during install.
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.frontend_image }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # secrets.* cannot be referenced in a job-level `if:`, so gate inside a
      # step: surface a boolean output and short-circuit the remaining steps
      # when KUBE_CONFIG is not configured.
      - name: Check for kubeconfig secret
        id: gate
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret is not set — skipping Kubernetes deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "KUBE_CONFIG secret present — deploy will proceed."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write kubeconfig
        if: steps.gate.outputs.enabled == 'true'
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          # KUBE_CONFIG holds a raw (plain-text) kubeconfig.
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Set up kubectl
        if: steps.gate.outputs.enabled == 'true'
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Set up Kustomize
        if: steps.gate.outputs.enabled == 'true'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.2"

      - name: Pin image tags in production overlay
        if: steps.gate.outputs.enabled == 'true'
        working-directory: infra/kubernetes/overlays/production
        run: |
          kustomize edit set image \
            "my-registry.local/git-interactive-backend=${{ needs.build-and-push.outputs.backend_image }}:${{ needs.build-and-push.outputs.image_tag }}"
          kustomize edit set image \
            "my-registry.local/git-interactive-frontend=${{ needs.build-and-push.outputs.frontend_image }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Deploy to Kubernetes
        if: steps.gate.outputs.enabled == 'true'
        run: |
          kubectl apply -k infra/kubernetes/overlays/production
          kubectl rollout status deployment/backend -n production-git-viz --timeout=180s
          kubectl rollout status deployment/frontend -n production-git-viz --timeout=180s
