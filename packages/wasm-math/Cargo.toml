[package]
name = "git-viz-wasm-math"
version = "1.0.0"
edition = "2021"
description = "WebGL canvas math (viewport culling + Bezier spline flattening) compiled to WebAssembly for the Git visualization frontend."
license = "MIT"

[lib]
# cdylib: the wasm artifact consumed by the frontend.
# rlib:   lets the native `cargo test` build link the pure-math core module.
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
# Optimise the wasm for size — it ships to the browser.
opt-level = "s"
lto = true
