services:
  postgres:
    # Fully-qualified so rootless Podman (no unqualified-search registries)
    # resolves it without extra host configuration.
    image: docker.io/library/postgres:15-alpine
    environment:
      POSTGRES_USER: git_viz
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: git_interactive_history
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U git_viz -d git_interactive_history"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  meilisearch:
    # Fully-qualified for rootless Podman (no unqualified-search registries).
    image: docker.io/getmeili/meilisearch:v1.7
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-devkey}"
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  vault:
    # DEV-ONLY HashiCorp Vault. Fully-qualified for rootless Podman (no
    # unqualified-search registries). Runs in `-dev` mode: storage is IN-MEMORY
    # and a root token is fixed, so ALL data (including the master key) is lost
    # on restart. The operator MUST seed the repo-credential key after start:
    #   vault kv put secret/git-viz repo_cred_key=<base64 of 32 bytes>
    # (e.g. `head -c 32 /dev/urandom | base64`). NOT for production.
    image: docker.io/hashicorp/vault:1.15
    command: ["server", "-dev"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_TOKEN:-root}"
      # Bind the dev listener to all interfaces so the backend can reach it.
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgres://git_viz:secret_password@postgres:5432/git_interactive_history?sslmode=disable"
      PORT: "8080"
      # Override via a local .env file next to this compose file; the
      # fallbacks keep local development working without external creds
      # (see apps/backend/.env.example for the full variable list).
      JWT_SECRET: "${JWT_SECRET:-super-secret-system-key-rotate-in-production}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      OAUTH_REDIRECT_URL: "${OAUTH_REDIRECT_URL:-http://localhost:8080/api/v1/auth/github/callback}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET:-}"
      # In-cluster Meilisearch service for full-text commit search.
      MEILI_URL: "${MEILI_URL:-http://meilisearch:7700}"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-devkey}"
      # HashiCorp Vault for the AES-256 repo-credential master key. When both
      # VAULT_ADDR and VAULT_TOKEN are set the backend resolves the key from
      # Vault (fail-closed); when empty it falls back to REPO_CRED_KEY/dev key.
      # Defaulting via ${...:-} keeps the backend booting without Vault.
      VAULT_ADDR: "${VAULT_ADDR:-http://vault:8200}"
      VAULT_TOKEN: "${VAULT_TOKEN:-}"
      VAULT_KV_PATH: "${VAULT_KV_PATH:-secret/data/git-viz}"
    volumes:
      # Bare-repo cache used by the Git engine (cwd/repos inside the
      # container, see docs/local-setup.md debugging notes).
      - repodata:/root/repos
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      # Repo root context: the frontend image needs the npm workspace root
      # and packages/ (shared-types, utils) to resolve workspace deps.
      context: ..
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  repodata:
  meilidata:
